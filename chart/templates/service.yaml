apiVersion: v1
kind: Service
metadata:
  name: {{ .Chart.Name }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "portfolio.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "portfolio.selectorLabels" . | nindent 4 }}
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
