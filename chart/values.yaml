namespace: portfolio

replicaCount: 2

image:
  repository: ghcr.io/OWNER/portfolio  # Replace OWNER with your GitHub username
  tag: latest
  pullPolicy: IfNotPresent

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 100m
    memory: 128Mi

publicContent:
  hostPath: /data/portfolio/public  # Path on the cluster node to mount as /usr/share/nginx/html

ingress:
  host: portfolio.example.com  # Replace with your domain
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
  tls:
    enabled: false
    secretName: portfolio-tls
